Syntax 3

# Minimal UCM2 top-level master for the Poly Trio C60 appliance.
#
# alsa-lib requires this file (ucm2/ucm.conf) to exist as the entry point for
# every card; there is no vendor-directory fallback.  The stock alsa-ucm-conf
# package (which normally ships this file plus a large conf.d/lib discovery
# tree) is NOT installed on this image, and the box has a single relevant
# sound card, so this master just points UCM at that card's config via a
# UseCasePath entry.  Directory is resolved relative to this ucm2/ directory.
#
# NOTE: card-context variables (${CardId} etc.) are not yet substituted while
# the top-level UseCasePath is resolved, and this box only has the "keplerc60"
# card, so the path is fixed rather than templated.  If alsa-ucm-conf is ever
# installed, drop this file and expose the card config to the distro master's
# auto-discovery as conf.d/<CardDriver>/<CardName>.conf (i.e. kepler-c60/).

UseCasePath.keplerc60 {
	Directory "conf.d/keplerc60"
	File "keplerc60.conf"
}
