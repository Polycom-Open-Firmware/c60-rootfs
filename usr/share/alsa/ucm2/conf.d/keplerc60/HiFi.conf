Syntax 3

# HiFi verb for the Poly Trio C60 conference audio card ("keplerc60").
#
# The card id is fixed by the kernel machine driver, so PCM/CTL device names
# are written out as hw:keplerc60,* rather than hw:${CardId},*.  On alsa-lib
# 1.2.8 the ${CardId} substitution is only populated when the card is opened
# as hw:N; it is left empty when the card is opened by name (e.g. the
# "alsaucm -c keplerc60 ..." form and some app code paths), which would break
# parsing.  Fixed names work regardless of how the card is opened.

SectionVerb {
	EnableSequence [
	]
	DisableSequence [
	]
}

SectionDevice."Speaker" {
	Comment "Conference loudspeaker (TAS5751M)"

	Value {
		PlaybackPCM "hw:keplerc60,0"
		PlaybackCTL "hw:keplerc60"
		PlaybackChannels "2"
		PlaybackVolume "name='Spk Master Volume'"
		PlaybackSwitch "name='Spk Speaker Switch'"
		PlaybackPriority "100"
	}

	# Ensure the amp output path is unmuted when the sink is in use.
	# (Volume is left at the driver default so nothing is blasted.)
	EnableSequence [
		cset "name='Spk Speaker Switch' on"
	]
	DisableSequence [
	]
}

SectionDevice."MicArray" {
	Comment "6-mic conference array (3x TLV320ADC3101, 8ch TDM)"

	Value {
		CapturePCM "hw:keplerc60,1"
		CaptureCTL "hw:keplerc60"
		CaptureChannels "8"
		CapturePriority "100"
	}

	# Input routing and the per-codec PGA/ADC gains are programmed by the
	# machine-driver fixup at boot; UCM deliberately leaves them untouched.
	# The three ADC codecs have independent gains and there is no single
	# hardware capture master, so no CaptureVolume is exposed here (apps such
	# as PipeWire apply software volume on the 8-channel source instead).
	EnableSequence [
	]
	DisableSequence [
	]
}
