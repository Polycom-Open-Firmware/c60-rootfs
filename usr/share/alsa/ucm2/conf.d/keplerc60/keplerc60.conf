Syntax 3

# Poly Trio C60 "kepler-c60" sound card (ASoC machine driver).
#   hw:keplerc60,0  Speaker Playback  (TAS5751M, 2ch)
#   hw:keplerc60,1  Mic Array Capture (3x TLV320ADC3101, 8ch TDM / 6 mics)
#
# Mic routing, differential input selection and the per-codec PGA/ADC gains
# are programmed by the machine driver's fixup at boot; UCM intentionally does
# not touch them.  Only the conference HiFi use case is provided.

Comment "Poly Trio C60 conference audio"

SectionUseCase."HiFi" {
	File "HiFi.conf"
	Comment "Conference audio: 6-mic array capture + speaker playback"
}
